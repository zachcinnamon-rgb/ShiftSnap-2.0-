<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ShiftSnap</title>

    <link rel="stylesheet" href="style.css">

    <!-- OpenCV -->
    <script async
        src="https://docs.opencv.org/4.x/opencv.js"
        onload="
            cv['onRuntimeInitialized'] = function () {
                window.cvReady = true;
                console.log('OpenCV Ready');
            };
        ">
    </script>

    <!-- Tesseract OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <script>
        window.cvReady = false;
    </script>

</head>

<body>

<div class="container">

    <header>

        <h1>ShiftSnap</h1>

        <p>FAA WMT Schedule Importer</p>

    </header>

    <section class="upload-card">

        <button id="uploadButton">
            Select WMT Screenshot
        </button>

        <input
            id="imageInput"
            type="file"
            accept="image/*"
            hidden>

        <p class="hint">
            Or drag and drop a screenshot anywhere on the page.
        </p>

    </section>

    <section>

        <h2>Status</h2>

        <p id="statusText">
            Loading OpenCV...
        </p>

    </section>

    <section>

        <h2>Original Screenshot</h2>

        <img
            id="previewImage"
            style="
                display:none;
                max-width:100%;
                border:1px solid #ccc;
            ">

    </section>

    <section>

        <h2>Schedule Detection</h2>

        <canvas
            id="processedCanvas"
            style="
                width:100%;
                max-width:100%;
                border:1px solid #ccc;
            ">
        </canvas>

    </section>

    <section>

        <h2>Cropped Schedule</h2>

        <canvas
            id="cropCanvas"
            style="
                width:100%;
                max-width:100%;
                border:1px solid #ccc;
            ">
        </canvas>

    </section>

</div>

<!-- Application Scripts -->

<script src="js/imageProcessor.js"></script>
<script src="js/gridDetector.js"></script>
<script src="app.js"></script>

<script>

const waitForOpenCV = setInterval(() => {

    if (window.cvReady) {

        clearInterval(waitForOpenCV);

        document.getElementById("statusText").textContent =
            "Ready";

    }

},100);

</script>

</body>

</html>
