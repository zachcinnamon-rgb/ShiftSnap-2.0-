<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ShiftSnap</title>

    <link rel="stylesheet" href="style.css">

    <!-- OpenCV Initialization -->
    <script>
        window.cvReady = false;

        var Module = {
            onRuntimeInitialized() {

                window.cvReady = true;

                console.log("OpenCV Ready");

                const status = document.getElementById("statusText");

                if (status) {
                    status.textContent = "OpenCV Ready";
                }

            }
        };
    </script>

    <!-- OpenCV -->
    <script src="https://docs.opencv.org/4.x/opencv.js"></script>

    <!-- OCR -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

</head>

<body>

<div class="container">

    <header>

        <h1>ShiftSnap</h1>

        <p>FAA WMT Schedule Importer</p>

    </header>

    <section class="upload-card">

        <button id="uploadButton">
            Select WMT Screenshot
        </button>

        <input
            id="imageInput"
            type="file"
            accept="image/*"
            hidden>

        <p class="hint">
            or drag and drop a screenshot anywhere on this page
        </p>

    </section>

    <section id="previewContainer">

        <h2>Original Screenshot</h2>

        <img
            id="previewImage"
            alt="Original Screenshot"
            style="display:none;max-width:100%;border:1px solid #ccc;">

    </section>

    <section id="processedContainer">

        <h2>Schedule Detection</h2>

        <canvas
            id="processedCanvas"
            style="max-width:100%;border:1px solid #ccc;">
        </canvas>

        <h2 style="margin-top:30px;">
            Cropped Schedule
        </h2>

        <canvas
            id="cropCanvas"
            style="max-width:100%;border:1px solid #ccc;">
        </canvas>

    </section>

    <section class="status">

        <strong>Status:</strong>

        <span id="statusText">
            Loading OpenCV...
        </span>

    </section>

</div>

<!-- Project Scripts -->

<script src="js/imageProcessor.js"></script>
<script src="js/gridDetector.js"></script>

</body>

</html>
